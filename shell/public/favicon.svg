<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shellGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066cc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer shell shape -->
  <path d="M50 5 C25 5 10 25 10 50 C10 75 25 90 50 95 C75 90 90 75 90 50 C90 25 75 5 50 5 Z"
        fill="url(#shellGradient)"
        filter="url(#glow)"/>
  <!-- Inner modular grid pattern -->
  <rect x="25" y="30" width="20" height="20" rx="3" fill="white" opacity="0.9"/>
  <rect x="55" y="30" width="20" height="20" rx="3" fill="white" opacity="0.9"/>
  <rect x="25" y="55" width="20" height="20" rx="3" fill="white" opacity="0.9"/>
  <rect x="55" y="55" width="20" height="20" rx="3" fill="white" opacity="0.7"/>
  <!-- Connecting lines showing integration -->
  <line x1="45" y1="40" x2="55" y2="40" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="45" y1="65" x2="55" y2="65" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="35" y1="50" x2="35" y2="55" stroke="white" stroke-width="2" opacity="0.8"/>
  <line x1="65" y1="50" x2="65" y2="55" stroke="white" stroke-width="2" opacity="0.8"/>
</svg>